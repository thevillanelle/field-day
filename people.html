<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Recess — People</title>
<link rel="stylesheet" href="commons.css">
<style>
  .people-page { padding-top: 120px; padding-bottom: 80px; }

  .people-hero { padding: 60px 0 40px; }
  .people-hero h1 { font-size: clamp(36px,5vw,56px); font-weight:700; margin-bottom:10px; }
  .people-hero p  { font-size:16px; color:var(--cream-dim); max-width:520px; }

  /* ── FILTERS ── */
  .filters {
    display: flex; gap: 12px; flex-wrap: wrap;
    margin: 32px 0 24px; align-items: center;
  }
  .filter-input {
    background: var(--navy-card); border: 1px solid var(--border-dim);
    border-radius: 8px; padding: 10px 16px;
    color: var(--cream); font-size: 13px; font-family: inherit;
    outline: none; min-width: 220px;
    transition: border-color 0.2s;
  }
  .filter-input:focus { border-color: var(--gold); }
  .filter-input::placeholder { color: var(--muted); opacity: 0.6; }

  /* ── PEOPLE GRID ── */
  .people-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }

  /* ── PERSON CARD ── */
  .person-card {
    background: var(--navy-card);
    border: 1px solid var(--border-dim);
    border-radius: 16px; padding: 24px;
    display: flex; flex-direction: column; gap: 14px;
    cursor: pointer; text-decoration: none; color: inherit;
    transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1),
                border-color 0.25s, box-shadow 0.3s;
  }
  .person-card:hover {
    transform: translateY(-8px);
    border-color: var(--border);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
  }
  .person-card-top { display: flex; align-items: center; gap: 14px; }
  .avatar {
    width: 48px; height: 48px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 800; color: var(--navy);
    flex-shrink: 0;
  }
  .person-name   { font-size: 16px; font-weight: 700; }
  .person-loc    { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .person-bio    { font-size: 13px; color: var(--cream-dim); line-height: 1.6;
                   display: -webkit-box; -webkit-line-clamp: 2;
                   -webkit-box-orient: vertical; overflow: hidden; }
  .person-tags   { display: flex; flex-wrap: wrap; gap: 6px; }
  .person-tag {
    font-size: 11px; padding: 3px 10px; border-radius: 8px;
    background: rgba(255,255,255,0.05); border: 1px solid var(--border-dim);
    color: var(--cream-dim);
  }
  .person-footer {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 11px; color: var(--muted); padding-top: 8px;
    border-top: 1px solid var(--border-dim);
  }
  .connection-count { display: flex; align-items: center; gap: 4px; }

  /* ── EMPTY / LOADING ── */
  .state-msg {
    grid-column: 1/-1; text-align: center;
    padding: 60px; color: var(--muted); font-size: 15px;
  }
  .count-label {
    font-size: 12px; color: var(--muted); margin-bottom: 16px;
    letter-spacing: 0.06em;
  }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html"><div class="stamp">✈</div><span>Global Recess</span></a>
  <ul class="nav-links">
    <li><a href="how-to-play.html">How It Works</a></li>
    <li><a href="people.html">People</a></li>
    <li><a href="quiz.html">Take the Quiz</a></li>
    <li><a href="games.html">Games</a></li>
    <li><a href="pair.html">Find Your Game</a></li>
    <li><a href="faq.html">FAQ</a></li>
  </ul>
</nav>

<main class="people-page">
  <div class="container">

    <section class="people-hero">
      <div class="section-label">The Community</div>
      <h1>People</h1>
      <p>Everyone who's joined Global Recess. Browse by location, vibe type, or what they're into.</p>
    </section>

    <div class="filters">
      <input class="filter-input" type="text" id="search" placeholder="🔍  Search by name, skill, hobby…" oninput="filterPeople()">
      <select class="filter-input" id="filter-location" onchange="filterPeople()" style="min-width:160px;">
        <option value="">All locations</option>
        <option>Austin</option>
        <option>Elk Grove</option>
        <option>Raleigh</option>
        <option>Singapore</option>
      </select>
      <select class="filter-input" id="filter-type" onchange="filterPeople()" style="min-width:160px;">
        <option value="">All types</option>
        <option value="explorer">🗺️ Explorer</option>
        <option value="rival">⚔️ Rival</option>
        <option value="creator">🎨 Creator</option>
        <option value="wanderer">🌀 Wanderer</option>
      </select>
    </div>

    <div class="count-label" id="count-label"></div>
    <div class="people-grid" id="people-grid">
      <div class="state-msg">Loading people…</div>
    </div>

  </div>
</main>

<footer>
  <p>Global Recess · Passport: Play</p>
  <p>global-recess.vercel.app</p>
</footer>

<script>
const API_BASE = window.API_BASE || '';

const TYPE_META = {
  explorer: { emoji:'🗺️', label:'Explorer', badge:'badge-explorer' },
  rival:    { emoji:'⚔️', label:'Rival',    badge:'badge-rival'    },
  creator:  { emoji:'🎨', label:'Creator',  badge:'badge-creator'  },
  wanderer: { emoji:'🌀', label:'Wanderer', badge:'badge-wanderer' },
};

let ALL_PEOPLE = [];

async function loadPeople() {
  try {
    const res = await fetch(`${API_BASE}/api/profiles`);
    if (!res.ok) throw new Error();
    ALL_PEOPLE = await res.json();
    renderPeople(ALL_PEOPLE);
  } catch {
    document.getElementById('people-grid').innerHTML =
      '<div class="state-msg">Couldn\'t load people right now. Try refreshing.</div>';
  }
}

function initials(name) {
  return name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
}

function renderPeople(people) {
  const grid = document.getElementById('people-grid');
  document.getElementById('count-label').textContent =
    `${people.length} member${people.length !== 1 ? 's' : ''}`;

  if (!people.length) {
    grid.innerHTML = '<div class="state-msg">No people match your filters.</div>';
    return;
  }

  grid.innerHTML = people.map(p => {
    const tm  = TYPE_META[p.vibe_type] || {};
    const tags = [...(p.skills||[]), ...(p.hobbies||[])].slice(0,3);
    const flagMap = { Austin:'🇺🇸', 'Elk Grove':'🇺🇸', Raleigh:'🇺🇸', Singapore:'🇸🇬' };
    const flag = flagMap[p.location] || '🌍';

    return `
    <a class="person-card" href="profile.html?id=${p.id}">
      <div class="person-card-top">
        <div class="avatar" style="background:${p.avatar_color || '#c9a84c'}">
          ${initials(p.name)}
        </div>
        <div>
          <div class="person-name">${p.name}</div>
          <div class="person-loc">${flag} ${p.location}</div>
        </div>
      </div>
      ${p.bio ? `<div class="person-bio">${p.bio}</div>` : ''}
      ${tags.length ? `
        <div class="person-tags">
          ${tags.map(t => `<span class="person-tag">${t}</span>`).join('')}
        </div>` : ''}
      <div class="person-footer">
        ${tm.emoji ? `<span class="type-badge ${tm.badge}">${tm.emoji} ${tm.label}</span>` : '<span></span>'}
        <span class="connection-count">🔗 ${p.connection_count || 0} connection${p.connection_count !== 1 ? 's' : ''}</span>
      </div>
    </a>`;
  }).join('');
}

function filterPeople() {
  const q    = document.getElementById('search').value.toLowerCase();
  const loc  = document.getElementById('filter-location').value;
  const type = document.getElementById('filter-type').value;

  const filtered = ALL_PEOPLE.filter(p => {
    const text = [p.name, p.bio, ...(p.skills||[]), ...(p.hobbies||[]), ...(p.interests||[])].join(' ').toLowerCase();
    return (!q    || text.includes(q))
        && (!loc  || p.location === loc)
        && (!type || p.vibe_type === type);
  });
  renderPeople(filtered);
}

loadPeople();
</script>
</body>
</html>
