<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Recess — Profile</title>
<link rel="stylesheet" href="commons.css">
<style>
  .profile-page { padding-top: 120px; padding-bottom: 80px; }

  /* ── PROFILE HERO ── */
  .profile-hero {
    display: flex; align-items: flex-start; gap: 40px;
    padding: 60px 0 48px; flex-wrap: wrap;
  }
  .profile-avatar {
    width: 100px; height: 100px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; font-weight: 800; color: var(--navy);
    flex-shrink: 0;
  }
  .profile-info { flex: 1; }
  .profile-name { font-size: clamp(28px,4vw,44px); font-weight: 700; margin-bottom: 8px; }
  .profile-sub  {
    display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
    font-size: 14px; color: var(--muted); margin-bottom: 16px;
  }
  .profile-sub span { display: flex; align-items: center; gap: 4px; }
  .profile-bio { font-size: 16px; color: var(--cream-dim); line-height: 1.7; max-width: 560px; }

  /* ── STATS ROW ── */
  .stats-row {
    display: flex; gap: 32px; flex-wrap: wrap;
    padding: 24px 0; border-top: 1px solid var(--border-dim);
    border-bottom: 1px solid var(--border-dim); margin-bottom: 40px;
  }
  .stat { text-align: center; }
  .stat-num  { font-size: 28px; font-weight: 800; color: var(--gold); }
  .stat-label{ font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-top: 4px; }

  /* ── SECTION ── */
  .profile-section { margin-bottom: 40px; }
  .profile-section h2 { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
  .tag-cloud { display: flex; flex-wrap: wrap; gap: 8px; }
  .tag-pill {
    padding: 6px 14px; border-radius: 20px;
    background: var(--navy-card); border: 1px solid var(--border-dim);
    font-size: 13px; color: var(--cream-dim);
  }

  /* ── CONNECTIONS GRID ── */
  .connections-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }
  .connection-card {
    background: var(--navy-card); border: 1px solid var(--border-dim);
    border-radius: 12px; padding: 16px;
    display: flex; align-items: center; gap: 12px;
    text-decoration: none; color: inherit;
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), border-color 0.2s;
  }
  .connection-card:hover { transform: translateY(-4px); border-color: var(--gold); }
  .conn-avatar {
    width: 38px; height: 38px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 800; color: var(--navy); flex-shrink: 0;
  }
  .conn-name { font-size: 13px; font-weight: 600; }
  .conn-loc  { font-size: 11px; color: var(--muted); }

  /* ── EDIT MODE ── */
  .edit-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 18px; border-radius: 8px;
    background: var(--navy-card); border: 1px solid var(--border-dim);
    color: var(--gold); font-size: 13px; cursor: pointer;
    font-family: inherit; transition: border-color 0.2s;
    margin-top: 16px;
  }
  .edit-btn:hover { border-color: var(--gold); }
  .edit-form { display: none; }
  .edit-form.active { display: block; }
  .edit-form textarea {
    width: 100%; background: var(--navy-card);
    border: 1px solid var(--border-dim); border-radius: 8px;
    padding: 12px 16px; color: var(--cream); font-family: inherit;
    font-size: 14px; resize: vertical; min-height: 80px;
    outline: none; transition: border-color 0.2s;
  }
  .edit-form textarea:focus { border-color: var(--gold); }
  .edit-form input[type="text"] { margin-bottom: 8px; }
  .tags-hint { font-size: 11px; color: var(--muted); margin: 4px 0 12px; }

  .not-found { text-align: center; padding: 100px 0; color: var(--muted); }
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html"><div class="stamp">✈</div><span>Global Recess</span></a>
  <ul class="nav-links">
    <li><a href="how-to-play.html">How It Works</a></li>
    <li><a href="people.html">People</a></li>
    <li><a href="quiz.html">Take the Quiz</a></li>
    <li><a href="games.html">Games</a></li>
    <li><a href="pair.html">Find Your Game</a></li>
    <li><a href="faq.html">FAQ</a></li>
  </ul>
</nav>

<main class="profile-page">
  <div class="container" id="profile-root">
    <div style="padding:100px 0; text-align:center; color:var(--muted);">Loading…</div>
  </div>
</main>

<footer>
  <p>Global Recess · Passport: Play</p>
  <p>global-recess.vercel.app</p>
</footer>

<script>
const API_BASE = window.API_BASE || '';

const TYPE_META = {
  explorer: { emoji:'🗺️', label:'Explorer', badge:'badge-explorer' },
  rival:    { emoji:'⚔️', label:'Rival',    badge:'badge-rival'    },
  creator:  { emoji:'🎨', label:'Creator',  badge:'badge-creator'  },
  wanderer: { emoji:'🌀', label:'Wanderer', badge:'badge-wanderer' },
};
const FLAGS = { Austin:'🇺🇸', 'Elk Grove':'🇺🇸', Raleigh:'🇺🇸', Singapore:'🇸🇬' };

function initials(name) {
  return name.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
}

const playerId = new URLSearchParams(location.search).get('id');

async function loadProfile() {
  if (!playerId) { showNotFound(); return; }
  try {
    const [profileRes, connRes] = await Promise.all([
      fetch(`${API_BASE}/api/profiles/${playerId}`),
      fetch(`${API_BASE}/api/connections/${playerId}`),
    ]);
    if (!profileRes.ok) { showNotFound(); return; }
    const profile     = await profileRes.json();
    const connections = connRes.ok ? await connRes.json() : [];
    renderProfile(profile, connections);
  } catch {
    showNotFound();
  }
}

function renderProfile(p, connections) {
  const tm   = TYPE_META[p.vibe_type] || {};
  const flag = FLAGS[p.location] || '🌍';
  const root = document.getElementById('profile-root');

  root.innerHTML = `
    <section class="profile-hero">
      <div class="profile-avatar" style="background:${p.avatar_color || '#c9a84c'}">
        ${initials(p.name)}
      </div>
      <div class="profile-info">
        <div class="profile-name">${p.name}</div>
        <div class="profile-sub">
          <span>${flag} ${p.location}</span>
          ${tm.emoji ? `<span class="type-badge ${tm.badge}">${tm.emoji} ${tm.label}</span>` : ''}
          <span>🔗 ${p.connection_count || 0} connection${p.connection_count !== 1 ? 's' : ''}</span>
        </div>
        ${p.bio ? `<div class="profile-bio">${p.bio}</div>` : ''}
        <button class="edit-btn" onclick="toggleEdit()">✏️ Edit my profile</button>
      </div>
    </section>

    <!-- EDIT FORM -->
    <div class="edit-form" id="edit-form">
      <div style="background:var(--navy-card); border:1px solid var(--border-dim); border-radius:16px; padding:32px; max-width:560px; margin-bottom:40px;">
        <h3 style="font-size:18px;font-weight:700;margin-bottom:20px;">Edit Your Profile</h3>
        <div class="form-group"><label>Bio</label>
          <textarea id="edit-bio" placeholder="Tell people a bit about yourself…">${p.bio || ''}</textarea>
        </div>
        <div class="form-group"><label>Skills <span class="tags-hint">(comma-separated)</span></label>
          <input type="text" id="edit-skills" value="${(p.skills||[]).join(', ')}" placeholder="e.g. Python, design, public speaking">
        </div>
        <div class="form-group"><label>Interests <span class="tags-hint">(comma-separated)</span></label>
          <input type="text" id="edit-interests" value="${(p.interests||[]).join(', ')}" placeholder="e.g. geography, film, cooking">
        </div>
        <div class="form-group"><label>Hobbies <span class="tags-hint">(comma-separated)</span></label>
          <input type="text" id="edit-hobbies" value="${(p.hobbies||[]).join(', ')}" placeholder="e.g. chess, hiking, music production">
        </div>
        <div style="display:flex;gap:10px;margin-top:8px;">
          <button class="btn btn-primary" style="flex:1;justify-content:center;" onclick="saveProfile('${p.id}')">Save →</button>
          <button class="btn btn-ghost" onclick="toggleEdit()">Cancel</button>
        </div>
        <div id="edit-status" style="font-size:13px;color:var(--sage-light);margin-top:12px;display:none;">✓ Saved</div>
      </div>
    </div>

    ${p.skills?.length ? `
    <section class="profile-section">
      <h2>Skills</h2>
      <div class="tag-cloud">${(p.skills||[]).map(s => `<span class="tag-pill">💼 ${s}</span>`).join('')}</div>
    </section>` : ''}

    ${p.interests?.length ? `
    <section class="profile-section">
      <h2>Interests</h2>
      <div class="tag-cloud">${(p.interests||[]).map(i => `<span class="tag-pill">✨ ${i}</span>`).join('')}</div>
    </section>` : ''}

    ${p.hobbies?.length ? `
    <section class="profile-section">
      <h2>Hobbies</h2>
      <div class="tag-cloud">${(p.hobbies||[]).map(h => `<span class="tag-pill">🎨 ${h}</span>`).join('')}</div>
    </section>` : ''}

    <section class="profile-section">
      <h2>Connections <span style="font-size:14px;font-weight:400;color:var(--muted);">(${connections.length})</span></h2>
      ${connections.length ? `
      <div class="connections-grid">
        ${connections.map(c => {
          const partner = c.partner || {};
          return `
          <a class="connection-card" href="profile.html?id=${partner.id}">
            <div class="conn-avatar" style="background:${partner.avatar_color || '#c9a84c'}">${initials(partner.name || '?')}</div>
            <div>
              <div class="conn-name">${partner.name || 'Unknown'}</div>
              <div class="conn-loc">${FLAGS[partner.location] || '🌍'} ${partner.location || ''}</div>
            </div>
          </a>`;
        }).join('')}
      </div>` : '<p style="color:var(--muted);font-size:14px;">No connections yet — play a game and make one. 🌍</p>'}
    </section>

    <div class="divider"></div>
    <a href="people.html" class="btn btn-outline">← Back to People</a>
  `;

  document.title = `${p.name} — Global Recess`;
}

function toggleEdit() {
  const form = document.getElementById('edit-form');
  form.classList.toggle('active');
}

async function saveProfile(id) {
  const split = s => s.split(',').map(x => x.trim()).filter(Boolean);
  const body  = {
    bio:       document.getElementById('edit-bio').value.trim(),
    skills:    split(document.getElementById('edit-skills').value),
    interests: split(document.getElementById('edit-interests').value),
    hobbies:   split(document.getElementById('edit-hobbies').value),
  };
  try {
    const res = await fetch(`${API_BASE}/api/profiles/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!res.ok) throw new Error();
    const status = document.getElementById('edit-status');
    status.style.display = 'block';
    setTimeout(() => { status.style.display = 'none'; loadProfile(); }, 1200);
  } catch {
    alert('Could not save. Please try again.');
  }
}

function showNotFound() {
  document.getElementById('profile-root').innerHTML = `
    <div class="not-found">
      <div style="font-size:48px;margin-bottom:16px;">🌍</div>
      <div style="font-size:20px;font-weight:700;margin-bottom:8px;">Profile not found</div>
      <div style="margin-bottom:24px;">This person hasn't joined yet — or the link is wrong.</div>
      <a href="people.html" class="btn btn-outline">← Back to People</a>
    </div>`;
}

loadProfile();
</script>
</body>
</html>
