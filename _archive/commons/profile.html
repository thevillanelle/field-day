<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Commons — Profile</title>
<link rel="stylesheet" href="commons.css">
<style>
  .profile-page { padding-top: 120px; padding-bottom: 80px; }

  /* ── PROFILE HERO ── */
  .profile-hero {
    display: flex; align-items: flex-start; gap: 40px;
    padding: 60px 0 48px; flex-wrap: wrap;
  }
  .profile-avatar {
    width: 100px; height: 100px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; font-weight: 800; color: var(--navy);
    flex-shrink: 0;
  }
  .profile-info { flex: 1; }
  .profile-name { font-size: clamp(28px,4vw,44px); font-weight: 700; margin-bottom: 8px; }
  .profile-sub  {
    display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
    font-size: 14px; color: var(--muted); margin-bottom: 16px;
  }
  .profile-sub span { display: flex; align-items: center; gap: 4px; }
  .profile-bio { font-size: 16px; color: var(--cream-dim); line-height: 1.7; max-width: 560px; }

  /* ── STATS ROW ── */
  .stats-row {
    display: flex; gap: 32px; flex-wrap: wrap;
    padding: 24px 0; border-top: 1px solid var(--border-dim);
    border-bottom: 1px solid var(--border-dim); margin-bottom: 40px;
  }
  .stat { text-align: center; }
  .stat-num  { font-size: 28px; font-weight: 800; color: var(--gold); }
  .stat-label{ font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-top: 4px; }

  /* ── SECTION ── */
  .profile-section { margin-bottom: 40px; }
  .profile-section h2 { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
  .tag-pill {
    display: inline-flex; align-items: center;
    padding: 6px 14px; border-radius: 20px;
    background: var(--navy-card); border: 1px solid var(--border-dim);
    font-size: 13px; color: var(--cream-dim);
    transition: border-color 0.2s, color 0.2s, transform 0.2s;
  }
  .tag-pill:hover {
    border-color: var(--gold); color: var(--gold);
    transform: translateY(-2px);
  }
  .tag-cloud { display: flex; flex-wrap: wrap; gap: 8px; }

  /* ── RECOGNITION ── */
  .recognition-section { margin-bottom: 40px; }
  .recognition-section h2 { font-size: 18px; font-weight: 700; margin-bottom: 6px; }
  .recognition-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; }

  .recognition-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }

  .recognition-card {
    background: var(--navy-card); border: 1px solid var(--border-dim);
    border-radius: 14px; padding: 20px 22px;
    display: flex; align-items: flex-start; gap: 14px;
    position: relative;
    animation: fadeUp 0.3s ease both;
  }
  .rec-avatar {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 800; color: var(--navy); flex-shrink: 0; margin-top: 2px;
  }
  .rec-body { flex: 1; }
  .rec-from {
    font-size: 12px; font-weight: 700; margin-bottom: 4px;
    display: flex; align-items: center; gap: 8px;
  }
  .rec-loc   { font-size: 11px; color: var(--muted); font-weight: 400; }
  .rec-text  { font-size: 14px; color: var(--cream-dim); line-height: 1.65; }
  .rec-date  { font-size: 11px; color: var(--muted); margin-top: 6px; opacity: 0.6; }

  .rec-actions {
    display: flex; gap: 6px; flex-shrink: 0;
    opacity: 0; transition: opacity 0.2s;
  }
  .recognition-card:hover .rec-actions { opacity: 1; }
  .rec-btn {
    background: none; border: 1px solid var(--border-dim); border-radius: 8px;
    padding: 4px 10px; cursor: pointer; font-size: 11px;
    font-family: inherit; color: var(--muted); transition: all 0.2s;
  }
  .rec-btn:hover { border-color: var(--gold); color: var(--gold); }
  .rec-btn.flag:hover { border-color: #e07850; color: #e07850; }
  .rec-btn.remove:hover { border-color: #fb7185; color: #fb7185; }

  .recognition-empty {
    text-align: center; padding: 32px;
    background: var(--navy-card); border: 1px dashed var(--border-dim);
    border-radius: 14px; color: var(--muted); font-size: 14px;
  }

  /* ── LEAVE A NOTE ── */
  .leave-note {
    background: var(--navy-card); border: 1px solid var(--border-dim);
    border-radius: 14px; padding: 22px; margin-top: 8px;
  }
  .leave-note h3 { font-size: 15px; font-weight: 700; margin-bottom: 14px; }
  .leave-note textarea {
    width: 100%; background: var(--navy-mid);
    border: 1px solid var(--border-dim); border-radius: 8px;
    padding: 12px 16px; color: var(--cream); font-family: inherit;
    font-size: 14px; resize: vertical; min-height: 80px; max-height: 200px;
    outline: none; transition: border-color 0.2s; line-height: 1.6;
  }
  .leave-note textarea:focus { border-color: var(--gold); }
  .leave-note textarea::placeholder { color: var(--muted); opacity: 0.5; }
  .note-meta {
    display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; align-items: flex-end;
  }
  .note-meta input { flex: 1; min-width: 160px; }
  .note-submit { flex-shrink: 0; }
  .char-count { font-size: 11px; color: var(--muted); margin-top: 6px; text-align: right; opacity: 0.5; }
  .connections-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 12px;
  }
  .connection-card {
    background: var(--navy-card); border: 1px solid var(--border-dim);
    border-radius: 12px; padding: 16px;
    display: flex; align-items: center; gap: 12px;
    text-decoration: none; color: inherit;
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1), border-color 0.2s;
  }
  .connection-card:hover { transform: translateY(-4px); border-color: var(--gold); }
  .conn-avatar {
    width: 38px; height: 38px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 800; color: var(--navy); flex-shrink: 0;
  }
  .conn-name { font-size: 13px; font-weight: 600; }
  .conn-loc  { font-size: 11px; color: var(--muted); }

  /* ── EDIT MODE ── */
  .edit-btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 18px; border-radius: 8px;
    background: var(--navy-card); border: 1px solid var(--border-dim);
    color: var(--gold); font-size: 13px; cursor: pointer;
    font-family: inherit; transition: border-color 0.2s;
    margin-top: 16px;
  }
  .edit-btn:hover { border-color: var(--gold); }
  .edit-form { display: none; }
  .edit-form.active { display: block; }
  .edit-form textarea {
    width: 100%; background: var(--navy-card);
    border: 1px solid var(--border-dim); border-radius: 8px;
    padding: 12px 16px; color: var(--cream); font-family: inherit;
    font-size: 14px; resize: vertical; min-height: 80px;
    outline: none; transition: border-color 0.2s;
  }
  .edit-form textarea:focus { border-color: var(--gold); }
  .edit-form input[type="text"] { margin-bottom: 8px; }
  .tags-hint { font-size: 11px; color: var(--muted); margin: 4px 0 12px; }

  .not-found { text-align: center; padding: 100px 0; color: var(--muted); }

  /* ── MOMENTS ── */
  .moments-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
  }
  .moment-row {
    background: var(--navy-card); border: 1px solid var(--border-dim);
    border-radius: 12px; padding: 16px 18px;
    display: flex; align-items: flex-start; gap: 14px;
    transition: border-color 0.2s, transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
  }
  .moment-row:hover { border-color: var(--border); transform: translateY(-3px); }
  .moment-icon { font-size: 22px; flex-shrink: 0; margin-top: 1px; }
  .moment-label { font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .moment-val   { font-size: 14px; color: var(--cream); line-height: 1.5; }
</style>
</head>

<!-- GLOBAL TICKER -->
<div id="global-ticker"></div>
<script src="data/people.js"></script>
<script src="ticker.js"></script>

<main class="profile-page has-ticker">
  <div class="container" id="profile-root">
    <div style="padding:100px 0; text-align:center; color:var(--muted);">Loading…</div>
  </div>
</main>

<footer>
  <p>Commons</p>
  <p>global-recess.vercel.app</p>
</footer>

<script src="data/people.js"></script>
<script>
const API_BASE = window.API_BASE || '';

const TYPE_META = {
  explorer: { emoji:'🗺️', label:'Explorer', badge:'badge-explorer' },
  rival:    { emoji:'⚔️', label:'Rival',    badge:'badge-rival'    },
  creator:  { emoji:'🎨', label:'Creator',  badge:'badge-creator'  },
  wanderer: { emoji:'🌀', label:'Wanderer', badge:'badge-wanderer' },
};
const FLAGS = {
  'Elk Grove':'🇺🇸','Santa Clara Valley':'🇺🇸','Seattle':'🇺🇸',
  'New York':'🇺🇸','Raleigh':'🇺🇸','Cork':'🇮🇪',
  'Singapore':'🇸🇬','Bangalore':'🇮🇳','Shanghai':'🇨🇳','Vietnam':'🇻🇳',
  'Austin':'🇺🇸'
};

function initials(name) {
  return (name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
}

const playerId = new URLSearchParams(location.search).get('id');

async function loadProfile() {
  if (!playerId) { showNotFound(); return; }

  // 1. Check static PEOPLE array first (the 100 demo people)
  const staticPerson = (typeof PEOPLE !== 'undefined')
    ? PEOPLE.find(p => p.id === playerId)
    : null;

  if (staticPerson) {
    // Normalise field names to match what renderProfile expects
    const p = {
      ...staticPerson,
      skills:    staticPerson.work_skills || [],
      interests: staticPerson.non_work    || [],
    };
    renderProfile(p, []);
    return;
  }

  // 2. Fall back to API for real registered users
  try {
    const [profileRes, connRes] = await Promise.all([
      fetch(`${API_BASE}/api/profiles/${playerId}`),
      fetch(`${API_BASE}/api/connections/${playerId}`),
    ]);
    if (!profileRes.ok) { showNotFound(); return; }
    const profile     = await profileRes.json();
    const connections = connRes.ok ? await connRes.json() : [];
    renderProfile(profile, connections);
  } catch {
    showNotFound();
  }
}

function renderProfile(p, connections) {
  const tm   = TYPE_META[p.vibe_type] || {};
  const flag = FLAGS[p.location] || '🌍';
  const root = document.getElementById('profile-root');

  const tagPill = (icon, val) =>
    `<a href="people.html?skill=${encodeURIComponent(val)}" class="tag-pill" style="text-decoration:none;cursor:pointer;" title="Find people who share this">${icon} ${val}</a>`;

  const momentRow = (emoji, label, val) => val ? `
    <div class="moment-row">
      <div class="moment-icon">${emoji}</div>
      <div>
        <div class="moment-label">${label}</div>
        <div class="moment-val">${val}</div>
      </div>
    </div>` : '';

  root.innerHTML = `
    <!-- HERO -->
    <section class="profile-hero">
      <div class="profile-avatar" style="background:${p.avatar_color || '#c9a84c'}">
        ${initials(p.name)}
      </div>
      <div class="profile-info">
        <div class="profile-name">${p.name}</div>
        <div class="profile-sub">
          <span>${flag} ${p.location}</span>
          ${p.home  ? `<span>🏠 ${p.home}</span>` : ''}
          ${p.roots ? `<span>🌱 ${p.roots}</span>` : ''}
          ${tm.emoji ? `<span class="type-badge ${tm.badge}">${tm.emoji} ${tm.label}</span>` : ''}
        </div>
        ${p.bio ? `<div class="profile-bio">${p.bio}</div>` : ''}

        <!-- ROLE ROW -->
        ${p.current_role || p.desired_next_role ? `
        <div style="display:flex;gap:20px;flex-wrap:wrap;margin-top:14px;">
          ${p.current_role ? `<div><div style="font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:3px;">Current role</div><div style="font-size:14px;font-weight:600;">${p.current_role}</div></div>` : ''}
          ${p.desired_next_role ? `<div><div style="font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-bottom:3px;">Next role I want</div><div style="font-size:14px;font-weight:600;color:var(--gold);">${p.desired_next_role}</div></div>` : ''}
        </div>` : ''}
      </div>
    </section>

    <!-- NOW -->
    ${p.status || p.song || p.hyperfixation || p.book || p.show ? `
    <section class="profile-section">
      <h2>Right Now</h2>
      <div class="moments-grid">
        ${momentRow('●',  'Status',              p.status)}
        ${momentRow('🎵', 'Song stuck in head',  p.song)}
        ${momentRow('🔮', 'Current hyperfixation',p.hyperfixation)}
        ${momentRow('📖', 'Reading',             p.book)}
        ${momentRow('📺', 'Watching',            p.show)}
      </div>
    </section>` : ''}

    <!-- WORK -->
    ${(p.skills?.length || p.work_playlist) ? `
    <section class="profile-section">
      <h2>Work</h2>
      ${p.skills?.length ? `<div class="tag-cloud" style="margin-bottom:${p.work_playlist ? '16px' : '0'}">
        ${(p.skills||[]).map(s => tagPill('💼',s)).join('')}
      </div>` : ''}
      ${p.work_playlist ? momentRow('🎧','Work playlist', p.work_playlist) : ''}
    </section>` : ''}

    <!-- INTERESTS & HOBBIES -->
    ${(p.interests?.length || p.hobbies?.length) ? `
    <section class="profile-section">
      <h2>Outside Work</h2>
      ${p.interests?.length ? `<div class="tag-cloud" style="margin-bottom:10px;">
        ${(p.interests||[]).map(i => tagPill('✨',i)).join('')}
      </div>` : ''}
      ${p.hobbies?.length ? `<div class="tag-cloud">
        ${(p.hobbies||[]).map(h => tagPill('🎨',h)).join('')}
      </div>` : ''}
    </section>` : ''}

    <!-- LIFE CORNERS -->
    ${p.pets || p.family ? `
    <section class="profile-section">
      <h2>Life</h2>
      <div class="moments-grid">
        ${momentRow('🐾', 'Pet corner',    p.pets)}
        ${momentRow('👨‍👩‍👧', 'Family corner', p.family)}
      </div>
    </section>` : ''}

    <!-- NEXT EVENT -->
    ${p.next_event ? `
    <section class="profile-section">
      <h2>Community</h2>
      <div class="moments-grid">
        ${momentRow('✈️', 'Next engagement event', p.next_event)}
      </div>
    </section>` : ''}

    <!-- CONNECTIONS -->
    <section class="profile-section">
      <h2>Connections <span style="font-size:14px;font-weight:400;color:var(--muted);">(${connections.length})</span></h2>
      ${connections.length ? `
      <div class="connections-grid">
        ${connections.map(c => {
          const partner = c.partner || {};
          return `
          <a class="connection-card" href="profile.html?id=${partner.id}">
            <div class="conn-avatar" style="background:${partner.avatar_color || '#c9a84c'}">${initials(partner.name || '?')}</div>
            <div>
              <div class="conn-name">${partner.name || 'Unknown'}</div>
              <div class="conn-loc">${FLAGS[partner.location] || '🌍'} ${partner.location || ''}</div>
            </div>
          </a>`;
        }).join('')}
      </div>` : '<p style="color:var(--muted);font-size:14px;">No connections yet — play a game and make one. 🌍</p>'}
    </section>

    <!-- RECOGNITION -->
    <section class="recognition-section" id="recognition-section">
      <h2>✨ Recognition</h2>
      <p class="recognition-sub">Leave a note for ${p.name.split(' ')[0]}. Compliments, shoutouts, something they did that stuck with you.</p>
      <div class="recognition-list" id="rec-list">
        <div class="recognition-empty">No notes yet — be the first to leave one.</div>
      </div>
      <div class="leave-note">
        <h3>Leave a note</h3>
        <textarea id="rec-text" maxlength="280"
          placeholder="e.g. 'Marcus explained async matching to me in a way that finally clicked. Genuinely helpful.'"
          oninput="document.getElementById('rec-char').textContent = (280 - this.value.length) + ' left'"></textarea>
        <div class="char-count" id="rec-char">280 left</div>
        <div class="note-meta">
          <input type="text"  id="rec-name"  class="filter-input" style="font-size:13px;" placeholder="Your name">
          <input type="text"  id="rec-loc"   class="filter-input" style="font-size:13px;max-width:160px;" placeholder="Your location">
          <button class="btn btn-primary note-submit" style="padding:10px 20px;font-size:13px;" onclick="submitNote('${p.id}','${p.name.split(' ')[0]}')">
            ✨ Leave a note →
          </button>
        </div>
        <div id="rec-feedback" style="font-size:13px;margin-top:10px;display:none;"></div>
      </div>
    </section>

    <div class="divider"></div>
    <a href="people.html" class="btn btn-outline">← Back to People</a>
  `;

  document.title = `${p.name} — Commons`;
  // Load recognition notes after DOM is set
  requestAnimationFrame(() => renderNotes(p.id, false));
}

function toggleEdit() {
  const form = document.getElementById('edit-form');
  form.classList.toggle('active');
}

async function saveProfile(id) {
  const split = s => s.split(',').map(x => x.trim()).filter(Boolean);
  const body  = {
    bio:       document.getElementById('edit-bio').value.trim(),
    skills:    split(document.getElementById('edit-skills').value),
    interests: split(document.getElementById('edit-interests').value),
    hobbies:   split(document.getElementById('edit-hobbies').value),
  };
  try {
    const res = await fetch(`${API_BASE}/api/profiles/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    if (!res.ok) throw new Error();
    const status = document.getElementById('edit-status');
    status.style.display = 'block';
    setTimeout(() => { status.style.display = 'none'; loadProfile(); }, 1200);
  } catch {
    alert('Could not save. Please try again.');
  }
}

function showNotFound() {
  document.getElementById('profile-root').innerHTML = `
    <div class="not-found">
      <div style="font-size:48px;margin-bottom:16px;">🌍</div>
      <div style="font-size:20px;font-weight:700;margin-bottom:8px;">Profile not found</div>
      <div style="margin-bottom:24px;">This person hasn't joined yet — or the link is wrong.</div>
      <a href="people.html" class="btn btn-outline">← Back to People</a>
    </div>`;
}

loadProfile();

// ─────────────────────────────────────────────────────────
//  RECOGNITION — localStorage-backed for prototype
//  In production: replace with /api/recognition/{profileId}
// ─────────────────────────────────────────────────────────

const ADMIN_IDS = ['p_admin']; // expand when DSID auth is live

function recKey(profileId) { return `commons_rec_${profileId}`; }

function loadNotes(profileId) {
  try { return JSON.parse(localStorage.getItem(recKey(profileId)) || '[]'); }
  catch { return []; }
}

function saveNotes(profileId, notes) {
  localStorage.setItem(recKey(profileId), JSON.stringify(notes));
}

function renderNotes(profileId, isOwner) {
  const list  = document.getElementById('rec-list');
  if (!list) return;
  const notes = loadNotes(profileId).filter(n => !n.flagged);

  if (!notes.length) {
    list.innerHTML = '<div class="recognition-empty">No notes yet — be the first to leave one.</div>';
    return;
  }

  list.innerHTML = notes.map((n, i) => {
    const av = n.from.split(' ').map(w => w[0]).join('').slice(0,2).toUpperCase();
    const canRemove = isOwner || ADMIN_IDS.includes('viewer'); // expands with real auth
    return `
    <div class="recognition-card" id="rec-card-${i}">
      <div class="rec-avatar" style="background:${n.color || '#c9a84c'}">${av}</div>
      <div class="rec-body">
        <div class="rec-from">
          ${n.from}
          ${n.loc ? `<span class="rec-loc">${n.loc}</span>` : ''}
        </div>
        <div class="rec-text">${escHtml(n.text)}</div>
        <div class="rec-date">${n.date}</div>
      </div>
      <div class="rec-actions">
        <button class="rec-btn flag" onclick="flagNote('${profileId}',${i})" title="Flag this note">🚩 Flag</button>
        ${canRemove ? `<button class="rec-btn remove" onclick="removeNote('${profileId}',${i})" title="Remove this note">✕ Remove</button>` : ''}
      </div>
    </div>`;
  }).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

const AVATAR_COLORS = ['#c9a84c','#52b788','#e07850','#8aabec','#c084fc','#fb7185','#34d399','#f59e0b'];

function submitNote(profileId, recipientFirstName) {
  const text = (document.getElementById('rec-text')?.value || '').trim();
  const from = (document.getElementById('rec-name')?.value || '').trim();
  const loc  = (document.getElementById('rec-loc')?.value  || '').trim();
  const fb   = document.getElementById('rec-feedback');

  if (!text) { showFeedback(fb, '⚠️ Write something first.', '#e07850'); return; }
  if (!from) { showFeedback(fb, '⚠️ Add your name.', '#e07850'); return; }
  if (text.length < 10) { showFeedback(fb, '⚠️ A little more than that — at least 10 characters.', '#e07850'); return; }

  const notes = loadNotes(profileId);
  const color = AVATAR_COLORS[Math.floor(Math.random() * AVATAR_COLORS.length)];
  const now   = new Date().toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });

  notes.unshift({ text, from, loc, color, date: now, flagged: false });
  saveNotes(profileId, notes);

  // Clear form
  document.getElementById('rec-text').value = '';
  document.getElementById('rec-name').value = '';
  document.getElementById('rec-loc').value  = '';
  document.getElementById('rec-char').textContent = '280 left';

  showFeedback(fb, `✨ Your note for ${recipientFirstName} has been saved.`, 'var(--sage-light)');

  // Re-render — isOwner unknown at note-submit time so pass false
  renderNotes(profileId, false);
}

function flagNote(profileId, idx) {
  if (!confirm('Flag this note for review? It will be hidden until reviewed.')) return;
  const notes = loadNotes(profileId);
  if (notes[idx]) { notes[idx].flagged = true; saveNotes(profileId, notes); renderNotes(profileId, true); }
}

function removeNote(profileId, idx) {
  if (!confirm('Remove this note permanently?')) return;
  const notes = loadNotes(profileId);
  notes.splice(idx, 1);
  saveNotes(profileId, notes);
  renderNotes(profileId, true);
}

function showFeedback(el, msg, color) {
  if (!el) return;
  el.textContent = msg;
  el.style.color = color;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 4000);
}
</script>
</body>
</html>
